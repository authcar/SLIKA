<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SLIKA</title>
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="icon" href="/assets/icooon.webp" type="image/webp" />
  </head>
  <body class="relative">
    <img
      class="absolute top-0 left-0 w-full h-full object-cover z-[-2]"
      src="/bg.webp"
      alt="Main background"
    />
    <img
      class="object-cover absolute z-10"
      style="
        max-width: 15%;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        position: absolute;
      "
      src="/assets/logo-slika.webp"
      alt="logo"
      onclick="window.location.href='index.html'"
    />
    <img
      class="sparklee sparkle1 object-cover absolute z-10"
      style="
        max-width: 12%;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        position: absolute;
      "
      src="/assets/sparkleoverlay1.webp"
      alt="sparkle1"
    />
    <img
      class="sparklee sparkle2 object-cover absolute z-10"
      style="
        max-width: 12%;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        position: absolute;
      "
      src="/assets/sparkleoverlay2.webp"
      alt="sparkle2"
    />
    <img
      class="absolute w-full object-cover z-0"
      src="/assets/garis.webp"
      alt="garis"
    />
    <div class="page-wrapper">
      <img src="/assets/bgsparkle1.webp" class="sparklebg1" />
      <img src="/assets/bgsparkle2.webp" class="sparklebg2" />

      <div class="konten">
        <div class="frame-wrapper">
          <div class="kont">
          <img src="/assets/frame.webp" class="frame" alt="frame" />
          <div id="photobooth-frame">
            <video id="videoview" autoplay playsinline></video>
            <canvas id="pinkCanvas"></canvas>
            <div id="countdown-overlay" class="hidden"></div>
            <!-- Capture canvas (hidden) -->
            <canvas
              id="captureCanvas"
              width="640"
              height="480"
              style="display: none"
            ></canvas>
          </div>
          </div>
        </div>
        <div class="button-group">
          <img
            id="capture-button"
            class="buttonfilter-ui"
            src="/assets/take.webp"
          />
          <img
            id="skipBtn"
            src="/assets/next.webp"
            class="buttonfilter-ui"
            style="width: 120px; cursor: pointer"
          />
          <img
            id="retake-button"
            class="buttonfilter-ui"
            src="/assets/button retake.webp"
            style="width: 120px; cursor: pointer"
          />
          <img
            id="confirm-button"
            class="buttonfilter-ui"
            src="/assets/button save.webp"
            alt="Confirm"
            style="width: 120px; cursor: pointer"
          />
        </div>
        <section id="images-container"></section>
        <!-- menampilkan preview foto-foto yang sudah diambil sebelum jadi layout final. -->
      </div>
    </div>
    <script type="module" src="/src/takephoto.js"></script>
    <script type="module" src="/src/cursor.js"></script>
    <script type="module" src="/src/clicksound.js"></script>
  </body>
</html>
