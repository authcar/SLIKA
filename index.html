<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SLIKA</title>
    <link rel="stylesheet" href="/src/main.css" />
    <link rel="icon" href="/src/assets/icooon.webp" type="image/png" />
  </head>

  <body class="relative">
    <img
      class="absolute top-0 left-0 w-full h-full object-cover z-[-2]"
      src="/bg.webp"
      alt="Main background"
    />
    <img
      class="object-cover absolute z-10"
      style="
        max-width: 15%;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        position: absolute;
      "
      src="/assets/logo-slika.webp"
      alt="logo"
    />
    <img
      class="sparklee sparkle1 object-cover absolute z-10"
      style="
        max-width: 12%;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        position: absolute;
      "
      src="/assets/sparkleoverlay1.webp"
      alt="sparkle1"
    />
    <img
      class="sparklee sparkle2 object-cover absolute z-10"
      style="
        max-width: 12%;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        position: absolute;
      "
      src="/assets/sparkleoverlay2.webp"
      alt="sparkle2"
    />
    <img
      class="absolute w-full object-cover z-0"
      src="/assets/garis.webp"
      alt="garis"
    />

    <div class="rectangle-wrapper">
      <img
        id="ui-rectangle"
        src="/assets/Rectangle 4.webp"
        class="rectangle"
        alt="rectangle"
      />

      <div id="step-layout" class="button-container">
        <img
          src="/assets/button.webp"
          class="button"
          data-layout="layout2"
          data-url="index2.html"
        />

        <img
          src="/assets/patternedbutton.webp"
          class="pbutton"
          data-layout="layout3"
          data-url="index2.html"
        />

        <img
          src="/assets/funbutton.webp"
          class="funbutton"
          data-layout="layout4"
          data-url="index2.html"
        />
      </div>
    </div>

    <audio id="clickSound" src="/src/assets/fairy.wav"></audio>

    <script type="module" src="/src/cursor.js"></script>
    <script type="module" src="/src/clicksound.js"></script>
    <script>
      const buttons = document.querySelectorAll("#step-layout img");
      buttons.forEach((button) => {
        button.addEventListener("click", () => {
          const layout = button.dataset.layout;
          const url = button.dataset.url;

          localStorage.setItem("selectedLayout", layout);
          console.log("Selected layout:", layout);

          window.location.href = url;
        });
      });
    </script>
  </body>
</html>
