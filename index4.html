<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SLIKA</title>
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="icon" href="/src/assets/icooon.png" type="image/png" />
    <style>
      .final-layout {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 48px;
        padding: 90px 60px 30px;
        box-sizing: border-box;
        z-index: 1;
      }

      /* LEFT: canvas preview */
      .final-canvas-col {
        flex: 0 0 auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      #finalCanvas {
        display: block;
        width: auto;
        height: calc(100vh - 140px);
        max-height: 580px;
        max-width: 260px;
        border-radius: 16px;
        box-shadow: 0 8px 40px rgba(255, 105, 180, 0.35), 0 2px 12px rgba(0,0,0,0.2);
        border: 3px solid rgba(255,255,255,0.5);
      }

      /* RIGHT: controls column */
      .final-controls-col {
        flex: 0 0 240px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }

      /* Frame label */
      .frame-section-label {
        width: 130px;
        filter: drop-shadow(0 2px 6px rgba(255,105,180,0.4));
      }

      /* Frame picker container */
      #frame-picker {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        width: 100%;
        max-height: 320px;
        overflow-y: auto;
        padding: 12px;
        background: rgba(255,255,255,0.12);
        border-radius: 20px;
        border: 1.5px solid rgba(255,255,255,0.3);
        backdrop-filter: blur(8px);
        box-shadow: 0 4px 20px rgba(255,105,180,0.15);
        box-sizing: border-box;
        scrollbar-width: thin;
        scrollbar-color: rgba(255,133,179,0.5) transparent;
      }

      #frame-picker::-webkit-scrollbar {
        width: 5px;
      }
      #frame-picker::-webkit-scrollbar-thumb {
        background: rgba(255,133,179,0.5);
        border-radius: 10px;
      }

      /* Buttons row */
      .final-buttons {
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
        width: 100%;
      }

      .final-buttons img {
        width: 140px;
        transition: transform 0.2s, filter 0.2s;
        cursor: pointer;
        filter: drop-shadow(0 2px 8px rgba(255,105,180,0.3));
      }

      .final-buttons img:hover {
        transform: scale(1.08);
        filter: drop-shadow(0 0 14px rgba(255,133,179,0.8));
      }

      .final-buttons img.disabled {
        opacity: 0.45;
        pointer-events: none;
        cursor: not-allowed;
        filter: none;
      }
    </style>
  </head>
  <body class="relative">
    <!-- Background -->
    <img
      class="absolute top-0 left-0 w-full h-full object-cover z-[-2]"
      src="/bg.png"
      alt="Main background"
    />
    <!-- Logo -->
    <img
      class="object-cover absolute z-10"
      style="max-width:15%;top:20px;left:50%;transform:translateX(-50%);position:absolute;"
      src="/assets/logo-slika.png"
      alt="logo"
      onclick="window.location.href='index.html'"
    />
    <!-- Sparkles -->
    <img class="sparklee sparkle1 object-cover absolute z-10"
      style="max-width:12%;top:20px;left:50%;transform:translateX(-50%);position:absolute;"
      src="/assets/sparkleoverlay1.png" alt="sparkle1" />
    <img class="sparklee sparkle2 object-cover absolute z-10"
      style="max-width:12%;top:20px;left:50%;transform:translateX(-50%);position:absolute;"
      src="/assets/sparkleoverlay2.png" alt="sparkle2" />
    <!-- Garis dekoratif -->
    <img class="absolute w-full object-cover z-0" src="/assets/garis.png" alt="garis" />


    <!-- ── MAIN TWO-COLUMN LAYOUT ── -->
    <div class="final-layout">

      <!-- LEFT: canvas -->
      <div class="final-canvas-col">
        <canvas id="finalCanvas" width="1080" height="1350"></canvas>
      </div>

      <!-- RIGHT: controls -->
      <div class="final-controls-col">
        <img src="/assets/Filters.png" class="frame-section-label" alt="Frames" />

        <!-- Frame picker di-inject oleh final.js -->
        <div id="frame-picker"></div>

        <!-- Buttons -->
        <div class="final-buttons">
          <img id="saveBtn" src="/assets/button save.png" alt="Save" class="disabled" />
          <img id="restartBtn" src="/assets/restart button.png" alt="Restart" />
        </div>
      </div>

    </div>

    <script type="module" src="/src/cursor.js"></script>
    <script type="module" src="/src/clicksound.js"></script>
    <script type="module" src="/src/final.js"></script>
  </body>
</html>
