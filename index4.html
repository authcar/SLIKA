<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SLIKA</title>
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="icon" href="/src/assets/icooon.png" type="image/png" />
    <style>
      /* ── Two-column final page layout ── */
      .final-layout {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 40px;
        padding: 80px 40px 20px;
        box-sizing: border-box;
        z-index: 1;
      }

      /* LEFT: canvas preview */
      .final-canvas-col {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #finalCanvas {
        display: block;
        width: auto;
        height: calc(100vh - 120px);
        max-height: 700px;
        max-width: 340px;
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      }

      /* RIGHT: controls column */
      .final-controls-col {
        flex: 0 0 220px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }

      /* Frame picker container */
      #frame-picker {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        width: 100%;
      }

      #frame-picker .frame-thumb-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        cursor: pointer;
        gap: 4px;
      }

      #frame-picker .frame-thumb-wrapper img {
        width: 85px;
        height: 85px;
        object-fit: cover;
        border-radius: 10px;
        border: 3px solid transparent;
        transition: border-color 0.2s, transform 0.15s;
      }

      #frame-picker .frame-thumb-wrapper img.selected,
      #frame-picker .frame-thumb-wrapper img:hover {
        border-color: #ff85b3;
        transform: scale(1.06);
      }

      #frame-picker .frame-thumb-wrapper span {
        font-size: 11px;
        color: #fff;
        font-family: sans-serif;
        text-shadow: 0 1px 3px rgba(0,0,0,0.5);
      }

      /* Buttons row */
      .final-buttons {
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: center;
        width: 100%;
      }

      .final-buttons img {
        width: 130px;
        transition: transform 0.2s, filter 0.2s;
        cursor: pointer;
      }

      .final-buttons img:hover {
        transform: scale(1.08);
        filter: drop-shadow(0 0 10px rgba(255,133,179,0.7));
      }

      .final-buttons img.disabled {
        opacity: 0.45;
        pointer-events: none;
        cursor: not-allowed;
      }

    </style>
  </head>
  <body class="relative">
    <!-- Background -->
    <img
      class="absolute top-0 left-0 w-full h-full object-cover z-[-2]"
      src="/bg.png"
      alt="Main background"
    />
    <!-- Logo -->
    <img
      class="object-cover absolute z-10"
      style="max-width:15%;top:20px;left:50%;transform:translateX(-50%);position:absolute;"
      src="./src/assets/logo-slika.png"
      alt="logo"
      onclick="window.location.href='index.html'"
    />
    <!-- Sparkles -->
    <img class="sparklee sparkle1 object-cover absolute z-10"
      style="max-width:12%;top:20px;left:50%;transform:translateX(-50%);position:absolute;"
      src="./src/assets/sparkleoverlay1.png" alt="sparkle1" />
    <img class="sparklee sparkle2 object-cover absolute z-10"
      style="max-width:12%;top:20px;left:50%;transform:translateX(-50%);position:absolute;"
      src="./src/assets/sparkleoverlay2.png" alt="sparkle2" />
    <!-- Garis dekoratif -->
    <img class="absolute w-full object-cover z-0" src="./src/assets/garis.png" alt="garis" />

    <!-- ── MAIN TWO-COLUMN LAYOUT ── -->
    <div class="final-layout">

      <!-- LEFT: canvas -->
      <div class="final-canvas-col">
        <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
          <canvas id="finalCanvas" width="1080" height="1350"></canvas>
          <!-- Sticker list di bawah canvas -->
        </div>
      </div>

      <!-- RIGHT: controls -->
      <div class="final-controls-col">
        <!-- Frame picker akan di-inject oleh final.js di sini -->
        <div id="frame-picker"></div>

        <!-- Buttons -->
        <div class="final-buttons">
          <img
            id="saveBtn"
            src="./src/assets/button save.png"
            alt="Save"
            class="disabled"
          />
          <img
            id="restartBtn"
            src="./src/assets/restart button.png"
            alt="Restart"
          />
        </div>
      </div>

    </div>

    <script type="module" src="/src/cursor.js"></script>
    <script type="module" src="/src/clicksound.js"></script>
    <script type="module" src="/src/final.js"></script>
  </body>
</html>
