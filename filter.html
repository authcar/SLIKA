<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SLIKA</title>
    <link rel="stylesheet" href="/src/main.css" />
    <link rel="icon" href="/assets/icooon.webp" type="image/webp" />
    
  </head>
  <body class="relative">
    <img
      class="absolute top-0 left-0 w-full h-full object-cover z-[-2]"
      src="/bg.webp"
      alt="Main background"
    />

    <img
      class="object-cover absolute z-10"
      style="
        max-width: 15%;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        position: absolute;
      "
      src="/assets/logo-slika.webp"
      alt="logo"
      onclick="window.location.href='index.html'"
    />
    <img
      class="sparklee sparkle1 object-cover absolute z-10"
      style="
        max-width: 12%;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        position: absolute;
      "
      src="/assets/sparkleoverlay1.webp"
      alt="sparkle1"
    />
    <img
      class="sparklee sparkle2 object-cover absolute z-10"
      style="
        max-width: 12%;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        position: absolute;
      "
      src="/assets/sparkleoverlay2.webp"
      alt="sparkle2"
    />
    <img
      class="absolute w-full object-cover z-0"
      src="/assets/garis.webp"
      alt="garis"
    />
    <div class="page-wrapper">
      <img src="/assets/smileyface.webp" class="smileyface" />
      <img src="/assets/bubble.webp" class="bubble" />
      <img
        src="/assets/bubble.webp"
        class="bubble"
        style="width: 37px; top: 400px"
      />
      <img src="/assets/heart.webp" class="heart" />
      <img src="/assets/bgsparkle1.webp" class="sparklebg1" />
      <img src="/assets/bgsparkle2.webp" class="sparklebg2" />
      <img class="star star-pink" src="/assets/pinkstar.webp" />
      <img class="star star-yellow" src="/assets/yellowstar.webp" />

      <div class="konten">
        <div class="frame-wrapper">
          <img src="/assets/frame.webp" class="frame" alt="frame" />
          <div id="photobooth-frame">
            <video id="webcam-feed" autoplay playsinline></video>
            <canvas id="pinkCanvas"></canvas>
          </div>
        </div>

        <div class="filter-container">
          <img
            src="/assets/Filters.webp"
            class="filter-label"
            style="max-width: 120px"
          />

          <img
            src="/assets/Frame 2.webp"
            class="ui-filter buttonfilter-ui filter-btn"
            data-filter="vintage"
          />
          <img
            src="/assets/Frame 3.webp"
            class="ui-filter buttonfilter-ui filter-btn"
            data-filter="twilight"
          />
          <img
            src="/assets/Frame 4.webp"
            class="ui-filter buttonfilter-ui filter-btn"
            data-filter="pink"
          />
          <img
            src="/assets/Frame 5.webp"
            class="ui-filter buttonfilter-ui filter-btn"
            data-filter="dreamy"
          />
          <img
            src="/assets/Frame 6.webp"
            class="ui-filter buttonfilter-ui filter-btn"
            data-filter="2016"
          />
          <img
            src="/assets/Frame 7.webp"
            class="ui-filter buttonfilter-ui filter-btn"
            data-filter="grayscale"
          />
          <img
            src="/assets/next.webp"
            class="buttonfilter-ui"
            id="nextBtn"
            style="max-width: 100px"
          />
        </div>
      </div>
    </div>
    <script>
      // Saat halaman selesai dimuat
      window.addEventListener("load", () => {
        const page = document.querySelector(".page-transition");
        setTimeout(() => {
          page.classList.add("show");
        }, 50); // kecil delay supaya transisi kelihatan
      });
    </script>
    <script type="module" src="/src/videoview.js"></script>
    <script type="module" src="/src/cursor.js"></script>
    <script type="module" src="/src/clicksound.js"></script>
  </body>
</html>
